<!DOCTYPE html>
<html>
<head>
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #6a85b6, #bac8e0);
            font-family: Arial;
        }

        .login-box {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            background: #5f6c7b;
            border-radius: 20px;
            text-align: center;
            color: white;
        }

        input {
            border-radius: 20px !important;
        }

        .btn-login {
            background-color: #00bcd4;
            color: white;
        }

        .btn-cancel {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <h1 class="text-center mt-3">Login Page</h1>
    <p class="text-center">Please enter your username and password.</p>
    <div class="login-box">
        <h2>Login</h2>
        <label>Username</label>
        <input type="text" id="username" class="form-control mb-3" placeholder="Enter here">
        <label>Password</label>
        <input type="password" id="password" class="form-control mb-3">

        <div class="form-check text-start">
            <input class="form-check-input" type="checkbox" id="stayCheck" onclick="checkBoxFunction()">
            <label class="form-check-label">
                Stay logged in
            </label>
        </div>

        <p id="checkMessage" style="font-size: 12px;"></p>

        <button class="btn btn-login mt-3" onclick="login()">Login</button>
        <button class="btn btn-cancel mt-3">Cancel</button>

        <p class="mt-3"><a href="#">Forgot username/password?</a></p>

    </div>

    <script>
        function login() {

            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            let correctUser = "rainbowdash";
            let correctPass = "Awesome67";

            if (user === correctUser && pass === correctPass) {
                window.alert("Welcome " + user + "!");
            } else {
                window.alert("Incorrect username and/or password.");
            }
        }

        function checkBoxFunction() {

            let isChecked = document.getElementById("stayCheck").checked;

            switch(isChecked) {
                case true:
                    document.getElementById("checkMessage").innerHTML =
                        "Your session will stay active on this device.";
                break;

                case false:
                    document.getElementById("checkMessage").innerHTML = "";
                break;
            }
        }
    </script>
</body>
</html>
